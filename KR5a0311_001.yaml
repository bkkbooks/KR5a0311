front:
  text: 疑仙傳卷上中下同卷翔一
  hash: sha256:05151f392eb73e335701f62b1289f0f786b756c7245282e512410c6608df9246
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0311_HFL_001-001a, image: hfl/0151/0151-004.png}
body:
  text: 隱夫玉簡撰夫神仙之事自古有之其間混迹固不可容易而測也僕偶於朋友中録得此事輒非潤色不敢便以神仙爲名今以諸傳搆成三卷目之爲疑仙傳爾明皇時李元者常遊華山下唯採諸藥食之性復好酒山下人多以酒飲之忽一日騎一白鹿舉手謂山下人曰我今去遊天台有老父三人遮道欲留之乃問之曰君方與山下之人相親又何遽别元曰老父輩殊不知相親必離也我今不敢背時而固離耳老父曰君方食華山之藥又遊天台何所食也元曰我在華山即食華山之藥在天台即食天台之藥也老父知不可留遂命之藉草酌以濃醪以叙别元臨歧而留藥三丸與老父三人謂曰當速食之乃上白鹿而去尋不知所之後二老父即食其藥一老父不食之經數月果死其二老父後皆一百五十歲方卒故人皆疑李元是仙矣蒲洲賣藥翁者於蒲州手携一藥囊賣藥不顯其姓名人皆呼爲賣藥翁人買藥不得則其疾必不愈蒲州富人王諭者性恬靜好善復長於醫術見此翁賣藥有異常流因具𣩮炙命之欲問焉賣藥翁既至諭家不揖諭而反揖一蒼頭諭以爲山野性不怪訝之因酌一杯酒自超獻之賣藥翁大笑而接飲之訖乃謂諭曰君欲問我夫便問勿待多禮也諭因問翁曰翁不顯姓名何人也翁曰天覆地載之人也既禀天地之氣爲人即姓人也名人也又何妄爲姓名也諭曰携一囊藥而治衆病何藥也賣藥翁曰人之病一也何衆病也人假氣託體而生氣和即體和體和即無病氣不和即體不和體不和即有病病本唯一也世人强名之是不達也我藥一也蓋達人之病由一也故但以一治之諭曰有買藥不得者何也翁曰人之生實難死實易常救之即生待病而救已難矣復又病乆方救焉得生也我每人買藥不與之者蓋救之不及也夫我之藥者人間之藥也生發於人間而欲餌之長生乆視即不可不察也知生死以治人之病即亦有功矣亦我自幼好餌藥固頗識藥之性藥之性識即可使不識即必反害人諭知其異因復問曰適者翁不揖我而揖蒼頭何也翁曰蒼頭是我輩之人也我見我輩固不覺揖也諭曰今便以此蒼頭奉君爲一弟子可乎翁曰若能捨之與我我亦與君一卷書諭因授此書令蒼頭隨賣藥翁去蒼頭忻然而去尋皆不知所在諭讀此書大達醫術後有一道人詣之堅求此書一觀諭既與觀之道人與此書忽然俱滅張鬱者燕人也客於京洛多與京洛豪貴子弟遊狂歌醉舞近十載忽因獨步沿洛川鬱既睹是時也風景恬和花卉芬馥幽鳥翔集於喬木佳魚踴躍於長波因高吟曰浮生如夢能幾何浮生復更憂患多無人與我長生術洛川春日且狂歌吟纔罷忽舉目見一翠幄臨水絃管清亮鬱驚歎曰是何人之遊春也言未絶有一女郎自幄中而出緩步水濱獨吟獨歎鬱性放蕩不可羈束不覺徑至女郎前問之曰是何神仙之女下陽臺邪來蓬瀛邪獨吟而又獨歎邪女郎駭然變色良乆乃歛容而言曰兒自獨吟獨歎何少年疏狂不拘之甚也安得容易來問鬱曰我天地間不羈之流也少耽詩酒適披麗質詠歎固願聞一言耳女郎微笑指翠幄而言曰可同詣此也鬱因同至翠幄内女郎乃命張綺席復舉絃管與鬱談笑共酌芳樽及日之夕也女郎曰人世信短促邪春未足秋又來纔紅顔遽白髪設或知人世之不可居而好道之者實可與言也鬱低頭不對女郎乃歌曰彩雲入帝鄉白鶴又徊翔乆留深不可蓬島路遐長又歌曰空愛長生術不是長生人今日洛川别可惜洞中春俄與鬱别乘洛波而去鬱大驚亦疑是水仙矣負琴生者遊長安數年日在酒肆乞酒飮之常負一琴人不問即不語人亦以爲狂或臨水或月下即援琴撫弄必淒切感人李太白聞焉就酒肆携手同岀垌野臨水竹藉草命之對飲因請撫琴生乃作一調弄太白不覺愴然生及謂太白曰人間絲竹之音盡樂於人心唯琴之音而傷人心我本謂爾不傷心不知爾亦傷心邪足知爾放曠拔俗是身也非心之放曠拔俗也太白本疑是異人復聞此語乃拜而問之曰丈者奚落魄之甚也心落魄也身落魄也生曰我心不落魄身亦不落魄但世人以此爲落魄故我有落魄之迹太白曰丈者知世人惡此落魄何不知而改之生曰我惡之即當改之世人惡之我奚改邪太白又曰丈者負此琴秪欲自撫之以爲樂也欲人樂之也生曰我此琴古琴也負之者我自好古之音也又孰欲人之樂也我琴中之音雅而純直而哀知音之者聞之即爲樂不知音者聞之但傷耳亦猶君之爲文也輕浮若蝶舞花飄豔冶如處子佳人王孫公子以爲麗詞達士即不以爲文也太白曰我之文即輕浮豔冶不足觀我之風骨氣㮣豈不肯仙才邪生曰君骨凡肉異非眞仙也止一貴人爾復況體穢氣卑亦貴不乆但愛惜其身無以虚名爲累言罷與太白同醉而回明日太白復欲引之於酒肆共飲不復見後數日太白於長安南大樹下見之方忻喜欲就問之忽然而滅葛用者常牽一黄犬遊歧隴間人或以酒飲之即飲而不食好與僧徒道流談每至夜即宿於郊野道士王奉敬仰焉忽謂奉曰可共乘此犬一遊也奉曰此犬可乘也用曰此犬能行也因共乘之此犬忽然躍身有如飛翥頃刻之間出中華之外約餘萬里至一山峰巒奇秀風景澄靜有殊人間也俄共下犬携手入一洞中見奇樹交陰名花爛然峻閣高臺多臨緑水俄又入一朱户有三女子出迎之韶玉麗質實世希有皆宛若舊識既延之登一樓俯翠欄褰朱簾設碧玉牀命以瓊漿共酌仍三女子雜坐須臾之間彈筝吹簫盡去形迹及將日暮皆已半醉用乃謂奉曰此三女子者皆神仙之家也偶會於此山我知之故與爾一詣今既共懽飲當復歸此若乆留不可不慮妨他女伴自遊戲也遂與奉俱出洞其三女子亦送之於洞門用顧謂女子曰明年今日再相見既與女子别復共乘犬回至歧隴間已三載矣用又謂奉曰我一東遊耳君當住此言訖而不見爾後不復至矣西川彭知微者卓鄭之流也家累千金唯生一女自幼好道嘗白知微求讀道書仍欲奉道之教知微不聽至年十六忽有一童兒乘一白鶴飛入知微家謂其女曰我是道家人聞爾好道故來教爾女驚喜見之且又聞欲教焉乃密藏此童兒及白鶴後數日一侍婢知其事問女曰何妖也爭可密藏設或父知其事得不以爲私乎女曰但勿泄我當速問道後遣之因至深夜齋戒捧香以禮童兒童兒謂曰爾好道之心不退必當得道女謂童兒曰夫人學道必先讀道書授法籙我且處閨闈間父不容如何也童兒曰爾能以心好道自然與好道之迹不殊也至於自古白日昇清天者又豈關讀道書授法籙也夫神仙之道本必在自然之神性亦在自然之骨氣故昔西王母言漢武非仙骨而神慢也女又問曰處人之世衣人之衣食人之食欲歸神仙之道不亦難也童兒曰不然但能以心慕神仙之道其心一則已感動神仙也既感動而必録之録之者神仙録其名氏焉知此則必潛有命故有餌术却粒而得之者苟修仙之侣深入空山遠離人寰草爲衣裳日夜勤苦於焚修而其心乍進而乍退不一焉又雖餌術却粒亦何望哉女復禮而言曰然如是當以何教我童兒曰爾之神性已達神仙也爾之骨氣又非凡俗也爾今心若誓死而一必不乆昇仙童兒言訖乃起辭曰神仙之道盡在此言也恭敬修之我今却去乃乘鶴飛去其女謂侍婢曰我達道也當得道耳尋絶滋味去鮮華常默然而坐忽一日失之不知所在劉簡者齊人也家富而好道每聞天下名山有神仙之迹必自策杖以一遊至於山中之藥無不服餌開元初遊八公山觀其異迹忽逢一人自稱虚無子謂簡曰我亦好道之流也偶此相遇當與君遊此後別遊一名山簡得其侣深喜乃曰我好遊神仙之山不期逢君迹如是邪虚無子乃謂簡曰自此東不遠一名山甚有神仙之迹去遊乎簡因曰願隨之一遊尋與簡東行數日但見山川杳絶人迹及至一大山息之於山下虚無子謂簡曰已出塵世萬餘里也今與君俱入此山君至此山必知與人間之山有殊也乃同前行遽見一大橋甚高峻及登陟之見兩邊欄檻並飾以珠翠俄至一宅四面皆山峰如畫門上有牌題之曰虚無子宅簡諤然謂虚無子曰何題吾子之名也虚無子笑曰但且入此宅及同入其門見樓閣臺榭非世間所有遽又引簡臨一流水閣内共坐須臾有青衣童子數人侍立樽俎間唯珠果香醪而已虚無子指水次一草謂簡曰只此草食之已與人間諸山之藥不同矣簡乃切求之虚無子令侍童撥一小艇過其水就水次取此草子以賜簡簡因藏於懷中起謂虚無子曰吾子必此住我當回虚無子超别謂簡曰君休遊名山訪神仙之迹但以此草子種之而以其苗食之當得長生不必須待作神仙也虚無子仍曰君其訪來路以歸庶不迷悮簡乃依其言訪舊路得還其鄉乃以此草子臨水種之自採其苗服餌後百餘歲髪不白一日忽與家人及鄉黨别而去不知所之疑仙傳卷上
