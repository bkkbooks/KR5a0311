body:
  text: 隱夫玉簡撰姜澄者不知何鄉人也常策一杖杖頭唯有一卷書客長安近一年每與輕薄之流遊處自稱得道人葉靜先生知之訪而責曰君何自稱得道人既不潔其身滌其神而又塵雜其遊處焉何哉澄曰我身無穢又奚潔也我神無撓又奚滌也不得道稱之即非得道稱之又何非也葉靜曰何謂身無穢何謂神無撓何謂得道邪澄曰夫荆玉温潤自然也雖與衆石同處故不穢又何異我身也濟水澄清本異也雖與濁河共流亦不撓又何異我神也大道也固無欺詐我既得道言之即達大道也葉靜又曰何謂達大道澄曰可道之道非常道也常道即大道也我若以貴者爲貴以富者爲富以賤者爲賤以貧者爲貧即非道也我知天地間人自區别殊不識道之本也道之本而生一氣一氣而生天地人及萬物今三才備萬物睹其由道也我達之是以狎富貴不以爲尊處塵雜不以爲卑但兀然混同而在人間此豈不謂達也葉靜笑曰我以爲君乆在人間不復能論道矣君其出塵寰塵寰不出墮君之迹澄曰我出塵寰非待君之言我已出之三百年也葉靜曰君既出塵寰何在塵寰也澄曰我暫來塵寰非不出也葉靜揖而退澄牽其衣而謂曰君與今天子友也而友爲人主君不教人主之道而反以仙家之事誘之必欲使不治人而好仙也君之非故不得以我之爲非也葉靜復笑曰休飾狂詞澄曰君休信狂迹我當休飾狂詞焉言罷俱笑而分手後數日不知所在人有見之乘鶴度關而去者沈敬浙右人也自幼學道後遊鍾山遇一老姥謂之曰爾骨秀神清心復正後十年當得道但修鍊之仍與一塊白石教之曰但以山泉煮此石不停火待軟如藥劑即食之若未軟不得停火言訖而不見老姥敬奇之因於山中結茅而居汲泉以煮此石不停火十載此石不軟敬乃不煮忽一夜此老姥復來謂敬曰始教爾以山泉煮此石今何不煮之敬曰我自奉教十載煮此石而不可食老姥曰此石非常石不可得也君既得之何不虔誠息慮以煮即不待十載而可食若信之與疑交生於心雖煮之十載亦不可食也敬曰此石何石也如非人間之石自然有異可食既有異又何必煮之然後可食也老姥曰此石是瓊樹之實也不知誰得遺於此山被人間深毒之風吹之故堅硬若以山泉虔誠煮之即復軟軟而食即得道矣敬乃拜謝之遽又不見其老姥敬遂齋戒汲山泉以煮之至明日其石忽軟仍香馥滿山敬沐浴而盡食之頓變童顔髭髪如漆仍心清體輕山中人皆怪焉後數日不見所之蕭寅吴人也儀貌環偉常遊天下之名山自幼食松栢仍餌生术不交世人性復孤孑忽因遊終南山山中有一少女來問之曰我亦學道之人也今欲少問道中之事君其爲我一剖析焉寅曰奚問邪少女曰我聞之自古修道之輩皆言去聲色而獨彭祖述陰陽交接之事何是何非邪寅曰我平生未嘗接一女子言論何逢女子此間也少女曰昔彭祖得道之人猶容婇女之問今君何不容我一問邪寅乃曰昔黄帝令婇女以問彭祖陰陽交會之道彭祖之對亦不非也蓋知黄帝未能去聲色故因而對之亦實非彭祖有九妻也自古學道者未有不云上士别床中士别被服藥百裏不如獨卧也如此則豈獨彭祖之一言可信也夫神聖尚待至一而感況神仙之道未捨世慾而欲求也少女曰古之有全家昇青天者有與妻俱之仙者又豈無世慾也寅曰此即是神仙之家降於世而復歸神仙也非是百世修之而昇天之仙也少女曰知其然也我一女子可修習而得道乎寅曰可爾之身禀陰之氣而生託陰之氣而活如自守陰之道而不犯陽自然得其道也少女謝而去之寅遽出終南山以入蜀山山中人見其儀貌有異多來問之寅又惡之而出以遠遊終不知所在韓業者常遊天下性好流水每止於流水邊秦淮内有一魚約長三尺其鱗五采每浮於波上見人即復没業既來水邊人有謂之曰此水中有一異魚君識之邪業笑而謂曰非魚也須臾之間此魚浮出於波上五色燦爛其人復問曰此既非魚何物也業曰此即是琴高之所乘白龍也琴高以此龍來命友也人又謂曰琴高何人也業曰琴高者神仙也昔曾暫出於人世或乘此龍於水中琴高恐世人見龍懼故變此龍爲魚由是世人以爲琴高控魚也我今見此識之人又曰知琴高命友者何也業曰琴高好流水又遊於水今既出此龍於波上足知命友也業乃入水於波中抱得此魚便於岸上結草以覆之至其夜人復來觀之業與魚俱不見焉吹笙女者常遊漢水邊容貌美麗年約十七八著碧衣手常捧一笙或凌晨薄暮即自吹之聲調感人但維一小艇於漢水人或就之即遽入小艇而去在漢水邊數年或去之經歲而返或月餘而復來水邊人呼爲吹笙女天寳初王懿者放蕩之子也自長安聞專往訪焉及至水邊數日不睹乃悵恨而歎曰我於長安中聞有神仙之女吹笙於此水故遠來欲一覿玉容少聽鳳笙不期水邊寂寂杳無人迹何今日不出蓬島而暫來此邪方欲盡興而回俄見此女獨乘小艇吹笙自遠而至俄又出小艇遊於水邊懿乃漸前進而言曰神仙女數年此遊何待也吹笙女回顧懿微笑而言曰待君也懿因謂之曰我常多憂患不喜人間欲遊物外又不知爾數年待我也吹笙女曰人間何足戀少年樂未極已老矣老又有終爭如他仙家僻在蓬萊處金銀宫闕之内駕鶴乘鸞以自嬉遊息芝田會瑶池而又本不老亦無終何憂患之能關慮也懿因戲之曰爾能容我爲一携笙之奴乎吹笙女笑曰君猶未省爲老奴已多年也吹笙女即命懿同入小艇去之後經數日吹笙女與懿復同來此水邊遊水邊人有見之者懿謂人曰寄語長安中少年我今被吹笙女携挈而遠遊不復遊長安也言訖與吹笙女復共入小艇吹笙而去自後不復來故不知所之也景仲者鄭人也幼好道但遊諸山以採藥服之未嘗寧處後過陜州欲西訪藥焉陜州有一老父問之曰君何遊也仲曰我平生好服餌神仙之藥常遊名山以採藥今亦欲西訪藥也老父曰君不知神仙之藥在十洲也非人間之山内有之也奚訪之仲曰老父自不知古昔有餌术餌黄精而得道者术與黄精豈自十洲採得也夫人間諸山之内神仙之藥無限但人自不識復又不能一其志而服之且十洲之地爭如中華也中華在天地之中有天地中正之氣故萬物華而人不蠻夷中華之人得道世世有之且不聞蠻夷世世有得道之人也足以知十洲之事是漢武之時人妄說也又何信哉我誓於中華諸山内採藥餌之耳遂西行訪藥後二十年復東過陜州仲已鬢髪斑白未獲靈藥又有一老父問之仲曰我前西行過此一老父問我採藥之事今復有老父欲問我邪老父曰前老父問爾之藥今老父欲問爾鬢髮斑白又何怪仲曰我自幼好道爲天地間人四十九年矣訪山尋藥力倦心疲未能出人間故鬢髪斑白老父又奚問邪乃不顧而東行入秦山餌茯苓十餘年不出一夜忽鬢髮俱黑又體輕殊常因出山西行不覺一曰至陜州乃復訪二老父尋皆偶之二老父俱笑曰訪藥老人已復少也仲方欲言遽不見二老父仲亦遠遊不知所之也何寧者西蜀富人之子也少好道棄家遠訪天台山學道十餘年復來家人問曰學得道邪何復來邪寧曰我自入天台山方悟道故不學而得之家人曰道可悟邪寧曰道不可學我今知之道止在悟我今亦知之矣道本在人之性也人之性有道即終得道人之性無道即終不得道我性有道固得之也既復在家唯食鮮果飲酒焉其後每至木葉落塞鴈來風悲日慘即歎曰人間須有此時以傷悽人也乃策杖而去及其春至景和紅花緑葉堆林積叢即又復來後因鄰人有死者聞哭之哀以問家人家人白之寧遽超於杖頭取一藥囊出一丸丹急使家人令納在死者口中鄰人死者得藥尋復蘇寧乃辭家人曰我今復遊天台不來矣爾各當自愛又出囊中藥普與家人謂之曰且可百歲既去人有郊野見之乘一虎去者果不復還得藥者後皆及百歲焉姚基者魏人也性奢逸不拘少好道因遊洞庭逢一道人謂之曰爾奢逸不自檢束又好神仙之道何也基拜而言曰我好奢逸者身好道者心我終求奢逸之事以樂我身亦求神仙之道以副我心道人曰我今俱授之與爾爾當俱勿授人基再拜之道人因袖中取一小玉匣内有書一卷以授基曰讀此盡得之也基因跪受以讀見九轉神丹之法復有燒金之術基問道人曰神丹服之得道信有之變銅鐵爲金有之邪道人曰銅鐵皆可爲金者亦猶人之賢與不肖皆可爲仙況銅鐵純一之物也君但鍊藥服餌以燒金焉基因復魏以居鍊藥燒金數年間家大富仍却老而少每至花時月夜即以㫖酒佳殽命賔侶狂歌醉舞或選幽景以出遊即乘駿駟以女妓絃管後隨盡興而方返至於家人亦被輕暖厭百味矣後忽因出遊復遇昔洞庭之道人基遽拜而問之曰吾師何乆不來邪道人曰爾之奢逸未息固不來適過此偶覿君之面基曰我奢逸不見吾師來固未息道人曰今當息之基笑而與道人俱至家廣陳錦繡出珍寳命酒有絲竹盡其懽醉明日道人與基皆不知所在家人無以求尋焉疑仙傳卷下
