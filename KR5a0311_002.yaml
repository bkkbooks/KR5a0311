body:
  text: 隱夫玉簡撰東方玄者荆州人也結一茅廬於南山下居之與其妻范氏俱好道忽因一道流過於山中玄與妻俱請至茅廬中玄乃削竹為脯汲水為酒以禮待道流道流甚驚之范氏又叱一竹杖為一大飛禽乘之而飛俄頃間復至携一碁局來謂道流曰我欲與玄對碁道流大怪因問曰何處去取此碁局邪范氏曰我往南海邊女伴家取此碁局來道流曰女伴何人也范氏曰此女伴亦有小術往往來與我戲吾師能暫伺之即當至矣道流因又問玄曰此皆何術也君與妻何得此事玄曰我昔偶娶得此范氏為妻傳我以其術即終不知此范氏始自何傳之也道流方與玄語空中有絲竹之聲須臾見一女子容質佳麗自空而下笑謂范氏曰何又招他俗流也范氏曰此道流過於山前我偶命之不似東方玄也其女子曰何未對碁也玄乃曰女伴但自去遊戲我且與此道流談論其女子即便於面前以手畫地變為一大池周回皆長松翠竹隈其岸即芰荷芬郁中有一畫舸其女子即自登之范氏遽以一隻屐投於池中又變為一畫舸各自遊泳仍自鼓棹而歌其歌聲清切甚傷感人道流乃泣下而歎曰我學道來十五餘年遊山訪藥未嘗敢怠終不遇人豈知此女郎皆有此神仙之事邪女子與范氏見之俱出畫舸而登岸似有不悅之色相顧良久其女子乃叱其池其池與松竹芰荷及畫舸皆應聲不見便仍與范氏俱各乘一竹升空而去玄笑謂道流曰吾師且歸勿久住此道流乃謝而去之及來年道流又過此因訪焉山下人皆曰東方玄已移家入遠山也李陽者蜀人也學道十餘年志不退嘗於江邊見一大龜白色如玉異之收養焉後三載此龜忽乘虛而去七日復來陽乃祝之曰神仙之道玄之又玄固不可鑽仰也余一自聞三清之景覽十洲之事知塵世不可以依倚已十餘年苦心於虔禱也其如無髣佛之迹以堅我心忽一日江邊見爾龜其色潔白如玉本異之收養何今日忽升空去又復來爾是仙家之龜也當每去而復來若不然其永去勿復住其龜遽又升空而去經七日又復至陽深疑是神仙變化因引之徐行於江邊遊賞忽有一老叟遽問陽曰此龜我所失也君何得陽曰我昔年於此水濱收得養之老叟曰此龜能乘虛空而遊又能入水底而不濡濕人若乘之可以遊萬里之外入四海之內也君既收養已久我今與君君當試乘之但自訪神仙乘此即可周遊八極矣陽拜謝之其老叟忽然不見陽乃以一足試踏龜背龜乃漸漸變身大如一牛陽因乘之龜負陽走入江中陽見水皆自分流略不濡濕乘之數日或入水或乘空約行萬里陽懼乃祝龜曰爾當負我歸須臾之間舉目已見却復舊隱也陽既知此龜有異因乘虛西邁又數日至一山上有瓊林瑶樹仍見一玉池聞山頂上有人歌聲陽不測其事又祝龜而回後又思仙境因乘此龜東邁倏忽間至一大川四望無際中有山山上有樓閣入雲陽又懼不敢入水而祝龜回蜀人頗怪陽去而復來有訪之以問者陽曰我多在山中取藥耳人又問其龜者陽曰此龜長生之物也我昔日在江邊見之收得以養雖色奇而别無它異其問者又因至夜竊此龜去陽乃遠遊不知所之長安樂人鄭文家生一女生而能言及年七歲容貌端莊而善於方響其親族皆呼為方響女貴妃知之因欲取焉父母問之方響女曰我豈是宮人邪楊妃自與我同輩也那得如此其夜忽失之父母哀憫無以求尋後三年復至家父母驚問其由謂父母曰我暫到上清宫中人言我父母悲號不止而憶念我我故再來耳父母因曰爾若是仙家之人何來我家為我女也女曰我上清方響妓女也因竊觀下界而罰我必不久住此人間父母當勿憶念父母曰爾仙家何樂我人間亦有富貴之樂爾奚不且住人間以慰我心女曰人間憂惱多而又奚樂邪我在上清無俗事以纍我也無俗心以惱我也侍立之外即每乘雲御氣駕鸞鳳嬉遊天外時酌瓊漿亦有時詣蓬島上天台揖嫦娥於月官戲織女於銀河人間何樂也若以富貴為樂殊不知富與貴但多事也況才見生俄見死邪父母乃曰當且住以慰我心無優劣人間天上之事且以生爾之父母為念女謂父母曰我若且住必不得還上清之官闕也父母悲言之次忽不見其女不知所之管革者趙人也少好道不事耕鑿多遊趙魏之間性不好謙恭而復辨恚忽因遊偶遇張果先生先生招之曰來管革革謂張果曰爾誰邪張果曰我張果先生也革乃曰張果何呼我也果因謂曰爾非不知人間之禮人間帝王尚敬我也爾奚不敬我也革曰我且非人間帝王又焉能敬爾也果因命之同遊恆山革從之果乃令革閉目革曰閉目即可去遊不閉目即不可去遊也果曰奈爾凡體邪革曰爾凡體尚可去我又豈不能去果擲所策之杖變一青牛令革乘之革既乘之與果同入恆山果因引革登絶頂坐而問之曰人間之囂雜塵中之苦惱春秋之榮謝少老之逼促爾盡察之也何久遊趙魏不遠遊四極趙魏戎馬之郊也非道人宜遊若夫滌慮蕩煩欲先潔其形趙魏之地不可革對曰爾何為出於趙魏之間也唯道人也不可隨土地而化我遊趙魏之間與遊玉清蓬瀛不殊矣若其以他帝王而為尊以我匹夫而為賤呼我之名氏談帝玉之敬待即朝在玉清蓬瀛夕屆趙魏亦俗之情生矣我又奚遠遊爾當遠遊以蟬蛻俗事苟不遠遊必死人間必不能同我也果笑而不對革又曰爾命我遊恆山者止欲一示我策杖為青牛邪爾豈不知何物不可變化物之變化不可奇自人而化仙者尚世世有之遽超不辭果而下絶頂因便結草於山中居之後不知其終人或有見之於嵇山草衣兒者自稱魯人也美容儀年可十四五冬夏常披一草衣故人號為草衣兒於泗水邊垂釣數年人未嘗見其得魚尤異之或問曰魚可充食乎對曰我不食魚但釣之也又或問其姓氏即對曰我自幼不識父亦猶方朔也故亦不能作一姓氏也泗水邊皆潛察其舉止草衣兒知之逃往漢江濱又垂釣江濱人初以為漁者及又不見獲魚雖炎燠凛冽但一草衣數年不易亦甚疑之又有問之者曰爾何姓名也為釣在江濱已數年寒暄但一草衣又不見得魚何也草衣兒曰我是草衣兒曰人呼我為草衣兒來垂釣也釣不必在魚也況我自得之又焉知我不得也我既號為草衣兒又安能更須姓名也江濱人亦潛察之草衣兒知之又逃往渭水垂釣水濱人見其容貌美又唯披一草衣深以為隱者後見其不獲魚乃疑之又有問之者曰君何隱也來渭水何也欲繼吕望之名邪草衣兒對曰我性好釣魚自幼便以垂釣為樂嘗亦釣於數水皆不可釣故來此水人亦見我披草衣呼我為草衣兒吕望者是他見紂不可諫欲佐西伯來此而待非釣魚也方今明主有天下無西伯可待又何繼吕望之名也問者曰爾不待西伯待何人也草衣兒曰我待一片石耳其人笑而不復問後數日有一片白石可長丈餘隨渭水流至草衣兒見之欣喜踴躍謂水邊人曰我本不釣魚待釣此石也數年間一身無所容今日可容此身也乃上此石乘流而去不知所之朱子真者長安南山下有别墅焉家甚富松檜成陰花竹雜植小橋架流水高閣齊岫雲子真常戴一葛巾衣輕縠手携一青竹杖自遨自遊以繡衣女子數人隨之遇興而便酌香醪獨醉人罕得見其面長安有少年趙穎者不羈之人也既聞之遂造謁焉及叩其門有一女僕出命之子真見穎問曰君何人也何遠來此相訪穎曰我愛歌喜酒之人也每恨天地不容花卉長春常恐平生有幽景不得一遊此外即雖貴列鼎鍾不關我心也子真喜乃延之於一小臺共酌金罍仍謂之曰君子遊狎之徒也多遊賞耳今欲不用絃管出一小妓共觀之乃令二侍女取一對木刻翥鳳飾之珠翠宛若其生仍有一女子金冠羅衣便舉聲而歌其鳳即舞故流風回雪之態未及須臾金冠女子歌罷鳳亦止舞子真乃自歌曰人間幾日變桑田誰識神仙洞裏天短促共知有殊異且須歡醉在生前穎聞之不覺長歎子真乃令侍女於玉壺中取一丸丹以賜穎曰服此且更遊人間二百年穎拜謝之仍辭而回及鑾輿將幸蜀山下忽失其子真家穎服此藥果得二百餘歲矣丁實者多遊洛陽自稱嵩山隱人髮白如絲而貌若桃華色或問之曰君應百歲也何時隱嵩山實曰我本秦始皇時儒士也李斯勸始皇坑儒焚書以愚黔首我即逃入嵩山遇一老叟謂我曰可令爾長生因授我一丸藥我吞之至於今雖髮白而容顔不變故不記多少歲也亦嘗識漢武時東方朔也方朔是仙家一小兒性顛狂仙家惡之令出於人世我曾拜王母王母有是言我故訪方朔以問方朔亦笑而不諱我亦識劉晨阮肇之輩此皆俗人耳偶然悮入他桃源洞終亦有俗心故不得仙也爾後好仙者多白日升天皆不復回我亦本非神仙故多不遇之人或又問曰君既得靈丹何不為仙也實曰我雖得長生之道而且不得乘虛御氣之道固不能升仙也實每歲至春和即必至洛陽城如此數十年人皆識焉祿山將起兵實謂人曰我又須逃胡與儒異也言訖而去不復至人皆疑是地仙耳疑仙傳卷中
